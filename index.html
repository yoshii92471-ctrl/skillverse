<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Quest 2026 - Human Development Journey</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#06b6d4);
min-height:100vh;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:20px;
color:#1e293b;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-bottom:20px;
}

.card{
background:#f1f5f9;
padding:15px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.progress{
width:100%;
height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin:15px 0;
}

.progress-bar{
height:100%;
width:0%;
background:#22c55e;
transition:0.5s;
}

.quiz-box{
background:#f8fafc;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.question{
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#4f46e5;
color:white;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;
color:#16a34a;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Life Quest 2026</h1>

<div class="stats">
<div class="card">❤️ Health<br><span id="health">50</span></div>
<div class="card">📚 Knowledge<br><span id="knowledge">50</span></div>
<div class="card">😊 Happiness<br><span id="happiness">50</span></div>
<div class="card">🤝 Relationships<br><span id="relations">50</span></div>
<div class="card">⭐ XP<br><span id="xp">0</span></div>
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="quiz-box">
<h2 id="levelTitle">Level 1: Infancy</h2>
<p class="question" id="question"></p>

<div id="options"></div>

<div class="result" id="result"></div>
</div>

</div>

<script>

const levels = [
{
title:"Level 1: Infancy",
question:"A caregiver responds consistently to your needs. What develops?",
options:["Trust","Distrust"],
answer:"Trust"
},
{
title:"Level 2: Early Childhood",
question:"A child is encouraged to make simple choices. What develops?",
options:["Autonomy","Shame"],
answer:"Autonomy"
},
{
title:"Level 3: Preschool",
question:"A child takes initiative and explores new activities.",
options:["Initiative","Guilt"],
answer:"Initiative"
},
{
title:"Level 4: School Age",
question:"Success in learning and school builds?",
options:["Industry","Inferiority"],
answer:"Industry"
},
{
title:"Level 5: Adolescence",
question:"Exploring values and goals develops?",
options:["Identity","Role Confusion"],
answer:"Identity"
},
{
title:"Level 6: Young Adult",
question:"Building meaningful relationships develops?",
options:["Intimacy","Isolation"],
answer:"Intimacy"
},
{
title:"Level 7: Adulthood",
question:"Contributing to society and helping others develops?",
options:["Generativity","Stagnation"],
answer:"Generativity"
},
{
title:"Level 8: Older Adult",
question:"Reflecting positively on life develops?",
options:["Integrity","Despair"],
answer:"Integrity"
}
];

let current = 0;
let xp = 0;

function loadQuestion(){

if(current >= levels.length){
document.getElementById("question").innerHTML =
"🏆 Congratulations! You completed Life Quest 2026!";
document.getElementById("options").innerHTML="";
document.getElementById("result").innerHTML=
"Final XP: " + xp;
document.getElementById("progressBar").style.width="100%";
return;
}

document.getElementById("levelTitle").innerText =
levels[current].title;

document.getElementById("question").innerText =
levels[current].question;

let html="";

levels[current].options.forEach(option=>{
html += `
<button onclick="checkAnswer('${option}')">
${option}
</button>`;
});

document.getElementById("options").innerHTML = html;

document.getElementById("progressBar").style.width =
(current/levels.length)*100 + "%";
}

function checkAnswer(choice){

if(choice === levels[current].answer){

xp += 10;

document.getElementById("xp").innerText = xp;

document.getElementById("knowledge").innerText =
Number(document.getElementById("knowledge").innerText)+5;

document.getElementById("happiness").innerText =
Number(document.getElementById("happiness").innerText)+3;

document.getElementById("result").innerHTML =
"✅ Correct! +10 XP";

}else{

document.getElementById("result").innerHTML =
"❌ Incorrect. Correct Answer: " +
levels[current].answer;
}

current++;

setTimeout(()=>{
document.getElementById("result").innerHTML="";
loadQuestion();
},1500);
}

loadQuestion();

</script>

</body>
</html>
